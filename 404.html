<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found | NPA Support Services</title>
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f5ee;color:#33372c;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{max-width:520px;text-align:center;background:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.9);border-radius:20px;padding:56px 40px;box-shadow:0 10px 40px rgba(40,60,30,.07)}
.code{font-size:.78rem;letter-spacing:3px;text-transform:uppercase;color:#6f8f3f;font-weight:800;margin-bottom:12px}
h1{color:#27493b;font-size:1.7rem;line-height:1.2;margin-bottom:12px;letter-spacing:-.02em}
p{color:#5f6553;font-size:1rem;line-height:1.65;margin-bottom:28px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-weight:700;font-size:.92rem;padding:15px 28px;border-radius:50px;transition:all .3s}
.p{background:linear-gradient(135deg,#6f8f3f,#8bad55);color:#fff;box-shadow:0 6px 20px rgba(111,143,63,.26)}
.p:hover{transform:translateY(-2px)}
.s{background:rgba(255,255,255,.8);color:#4a4f40;border:1px solid #e6e7dd}
.s:hover{background:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="code">404 &middot; Page not found</div>
  <h1>We couldn&rsquo;t find that page.</h1>
  <p>The page may have moved or the link may be out of date. You can head back to the home page, or make a referral directly.</p>
  <div class="btns">
    <a class="p" href="/npa-support-services/">Go to Home</a>
    <a class="s" href="/npa-support-services/referrals">Make a Referral</a>
  </div>
</div>
</body>
</html>
